name: 🚀 Deploy SAM App

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
    types: [closed]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  SAM_STACK_NAME: ${{ secrets.SAM_STACK_NAME }}
  SAM_S3_BUCKET: ${{ secrets.SAM_S3_BUCKET }}
  PYTHON_VERSION: '3.12'

jobs:
  test-and-validate:
    name: 🧪 Test & Validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest aws-sam-cli boto3
          
      - name: 🧪 Run unit tests
        run: |
          echo "🔧 Configurando entorno para pytest..."
    
          # Establecer PYTHONPATH para la sesión completa
          export PYTHONPATH="${{ github.workspace }}:${PYTHONPATH}"
    
          # Verificar configuración
          echo "📁 Root del proyecto: ${{ github.workspace }}"
          echo "📦 PYTHONPATH: $PYTHONPATH"
    
          # Ejecutar pytest con configuración explícita
          # --import-mode=importlib usa el sistema estándar de imports de Python
          python -m pytest tests/test_app.py -v --tb=short --import-mode=importlib -s
    
      - name: 🔍 Validate SAM template
        run: |
          sam validate --template template.yaml --region ${{ env.AWS_REGION }}

      - name: 📊 Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            .pytest_cache/
            *.log
          retention-days: 5

  build-and-deploy:
    name: 🏗️ Build & Deploy
    runs-on: ubuntu-latest
    needs: test-and-validate
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true))
    
    permissions:
      id-token: write  # Required for OIDC
      contents: read
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install SAM CLI
        run: |
          pip install aws-sam-cli

      - name: 🔐 Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-SAM-Deploy

      - name: 🔨 Build SAM application
        run: |
          sam build --use-container

      - name: 🚀 Deploy to AWS
        run: |
          sam deploy \
            --template-file template.yaml \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --s3-bucket ${{ env.SAM_S3_BUCKET }} \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides Environment=production

      - name: 📤 Export API URL from CloudFormation
        run: |
          echo "🔍 Obteniendo URL del endpoint desde CloudFormation..."
  
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name "${{ env.SAM_STACK_NAME }}" \
            --region "${{ env.AWS_REGION }}" \
            --query 'Stacks[0].Outputs[?OutputKey==`HelloApi`].OutputValue' \
            --output text 2>&1)
          
          # Debug: mostrar lo que se obtuvo
          echo "📡 Raw API_URL output: '$API_URL'"
    
          # Validar que no sea error ni vacío
          if [ -z "$API_URL" ] || echo "$API_URL" | grep -qi "error\|does not exist"; then
            echo "❌ No se pudo obtener la API URL"
            echo "📋 Outputs disponibles del stack:"
            aws cloudformation describe-stacks \
              --stack-name "${{ env.SAM_STACK_NAME }}" \
              --region "${{ env.AWS_REGION }}" \
              --query 'Stacks[0].Outputs[*].{Key:OutputKey,Value:OutputValue}' \
              --output table || echo "Stack no encontrado"
            exit 1
        fi
    
        # Exportar para el siguiente step usando la sintaxis correcta de GitHub Actions
        echo "API_URL=$API_URL" >> $GITHUB_ENV
        echo "✅ API URL exportada: $API_URL"

      - name: ✅ Post-deployment validation
        run: |
          echo "🔍 Validando endpoint: $API_URL"
    
          # Validar que API_URL no esté vacío (con indentación CORRECTA)
          if [ -z "$API_URL" ]; then
            echo "❌ ERROR: API_URL está vacío. Verificar outputs del stack."
            exit 1
          fi
    
          # API Gateway puede tardar unos segundos en propagar (eventual consistency)
          # Intentar hasta 3 veces con espera entre intentos
          MAX_RETRIES=3
          RETRY_DELAY=15
    
          for attempt in $(seq 1 $MAX_RETRIES); do
            echo "🔄 Intento $attempt de $MAX_RETRIES..."
      
            # Hacer request con timeout y capturar status HTTP
            HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 30 "$API_URL" 2>&1)
            CURL_EXIT_CODE=$?
      
            if [ $CURL_EXIT_CODE -ne 0 ]; then
              echo "⚠️ curl falló con código $CURL_EXIT_CODE: $HTTP_RESPONSE"
            else
              BODY=$(echo "$HTTP_RESPONSE" | head -n1)
              STATUS=$(echo "$HTTP_RESPONSE" | tail -n1)
        
              echo "📡 Response Status: $STATUS"
              echo "📦 Response Body: $BODY"
        
              # Validar respuesta exitosa
              if [ "$STATUS" = "200" ] && echo "$BODY" | grep -q "Hello World"; then
                echo "✅ Validación exitosa en intento $attempt: Endpoint responde correctamente"
                exit 0
              else
                echo "⚠️ Respuesta no esperada (intentando de nuevo...)"
              fi
            fi
      
            # Esperar antes del siguiente intento (excepto en el último)
            if [ $attempt -lt $MAX_RETRIES ]; then
              echo "⏳ Esperando ${RETRY_DELAY}s antes del siguiente intento..."
              sleep $RETRY_DELAY
            fi
          done
    
          # Si llegamos aquí, todos los intentos fallaron
          echo "❌ Validación fallida después de $MAX_RETRIES intentos"
          echo "   Última respuesta: $HTTP_RESPONSE"
          echo "   API URL: $API_URL"
          exit 1

      - name: 📋 Deployment summary
        if: always()
        run: |
          echo "### 📊 Resumen del Despliegue" >> $GITHUB_STEP_SUMMARY
          echo "- **Stack**: ${{ env.SAM_STACK_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Región**: ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API URL**: $API_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
