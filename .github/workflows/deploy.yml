# .github/workflows/deploy.yml
name: 🚀 Deploy SAM App

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]
    types: [closed]

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  SAM_STACK_NAME: ${{ secrets.SAM_STACK_NAME }}
  SAM_S3_BUCKET: ${{ secrets.SAM_S3_BUCKET }}
  PYTHON_VERSION: '3.12'

jobs:
  test-and-validate:
    name: 🧪 Test & Validate
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest aws-sam-cli boto3
          
      - name: 🧪 Run unit tests
        run: |
          echo "🔧 Configurando entorno para pytest..."
    
          # Establecer PYTHONPATH para la sesión completa
          export PYTHONPATH="${{ github.workspace }}:${PYTHONPATH}"
    
          # Verificar configuración
          echo "📁 Root del proyecto: ${{ github.workspace }}"
          echo "📦 PYTHONPATH: $PYTHONPATH"
    
          # Ejecutar pytest con configuración explícita
          # --import-mode=importlib usa el sistema estándar de imports de Python
          python -m pytest tests/test_app.py -v --tb=short --import-mode=importlib -s
    
      - name: 🔍 Validate SAM template
        run: |
          sam validate --template template.yaml --region ${{ env.AWS_REGION }}

      - name: 📊 Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: |
            .pytest_cache/
            *.log
          retention-days: 5

  build-and-deploy:
    name: 🏗️ Build & Deploy
    runs-on: ubuntu-latest
    needs: test-and-validate
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.merged == true))
    
    permissions:
      id-token: write  # Required for OIDC
      contents: read
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: 📦 Install SAM CLI
        run: |
          pip install aws-sam-cli

      - name: 🔐 Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-SAM-Deploy

      - name: 🔨 Build SAM application
        run: |
          sam build --use-container

      - name: 🚀 Deploy to AWS
        run: |
          sam deploy \
            --template-file template.yaml \
            --stack-name ${{ env.SAM_STACK_NAME }} \
            --s3-bucket ${{ env.SAM_S3_BUCKET }} \
            --region ${{ env.AWS_REGION }} \
            --capabilities CAPABILITY_IAM \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides Environment=production

      - name: 📤 Export API URL from CloudFormation
  id: get-api-url  # ← IMPORTANTE: Agregar ID para referenciar outputs
  run: |
    echo "🔍 Obteniendo URL del endpoint desde CloudFormation..."
    
    STACK_NAME="${{ env.SAM_STACK_NAME }}"
    AWS_REGION="${{ env.AWS_REGION }}"
    
    echo "📋 Parámetros:"
    echo "   Stack: $STACK_NAME"
    echo "   Region: $AWS_REGION"
    
    # Esperar un momento para que los outputs estén disponibles (eventual consistency)
    echo "⏳ Esperando 10s para que CloudFormation propague outputs..."
    sleep 10
    
    # Intentar obtener la URL con manejo robusto de errores
    API_URL=""
    for retry in 1 2 3; do
      echo "🔄 Intento $retry de obtener API URL..."
      
      API_URL=$(aws cloudformation describe-stacks \
        --stack-name "$STACK_NAME" \
        --region "$AWS_REGION" \
        --query 'Stacks[0].Outputs[?OutputKey==`HelloApi`].OutputValue' \
        --output text 2>&1) || true
      
      # Verificar si es un valor válido (no error, no vacío, no "None")
      if [ -n "$API_URL" ] && [ "$API_URL" != "None" ] && ! echo "$API_URL" | grep -qi "error\|does not exist"; then
        echo "✅ API URL obtenida: $API_URL"
        break
      fi
      
      echo "⚠️ Intento $retry fallido, esperando 5s..."
      sleep 5
    done
    
    # Validación final
    if [ -z "$API_URL" ] || [ "$API_URL" = "None" ] || echo "$API_URL" | grep -qi "error"; then
      echo "❌ ERROR: No se pudo obtener la API URL después de 3 intentos"
      echo "📋 Debug: Listando outputs del stack:"
      aws cloudformation describe-stacks \
        --stack-name "$STACK_NAME" \
        --region "$AWS_REGION" \
        --query 'Stacks[0].Outputs' \
        --output table 2>&1 || echo "Stack no encontrado o sin outputs"
      exit 1
    fi
    
    # Exportar usando GITHUB_ENV con formato correcto
    # NOTA: Usar >> para append, y asegurar que no haya espacios alrededor del =
    echo "API_URL=${API_URL}" >> $GITHUB_ENV
    
    # También exportar como output del step para referencia inmediata
    echo "url=${API_URL}" >> $GITHUB_OUTPUT
    
    echo "✅ API_URL exportada correctamente"
    echo "🔗 URL: $API_URL"

      - name: ✅ Post-deployment validation
  run: |
    echo "🔍 Validando endpoint..."
    
    # Obtener API_URL: primero del environment, luego del step output como fallback
    ENDPOINT="${API_URL:-${{ steps.get-api-url.outputs.url }}}"
    
    echo "📡 Endpoint a validar: '$ENDPOINT'"
    
    # Validación crítica: si está vacío, fallar inmediatamente con debug
    if [ -z "$ENDPOINT" ]; then
      echo "❌ ERROR CRÍTICO: ENDPOINT está vacío"
      echo "📋 Variables disponibles:"
      echo "   API_URL (env): '${API_URL}'"
      echo "   steps.get-api-url.outputs.url: '${{ steps.get-api-url.outputs.url }}'"
      echo "📋 Contenido de GITHUB_ENV:"
      cat $GITHUB_ENV 2>/dev/null || echo "(no accessible)"
      exit 1
    fi
    
    # API Gateway puede tardar en propagar: reintentos con backoff
    MAX_RETRIES=5
    RETRY_DELAY=10
    
    for attempt in $(seq 1 $MAX_RETRIES); do
      echo "🔄 Intento $attempt de $MAX_RETRIES..."
      
      # Ejecutar curl con opciones robustas
      set +e  # No salir si curl falla
      HTTP_RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 30 --retry 2 "$ENDPOINT" 2>&1)
      CURL_EXIT=$?
      set -e  # Restaurar comportamiento normal
      
      if [ $CURL_EXIT -ne 0 ]; then
        echo "⚠️ curl falló (exit code $CURL_EXIT): $HTTP_RESPONSE"
      else
        # Parsear respuesta: última línea es el status HTTP
        BODY=$(echo "$HTTP_RESPONSE" | sed '$d')
        STATUS=$(echo "$HTTP_RESPONSE" | tail -n1)
        
        echo "📡 HTTP Status: $STATUS"
        echo "📦 Response Body: $BODY"
        
        # Validar respuesta exitosa
        if [ "$STATUS" = "200" ] && echo "$BODY" | grep -q "Hello World"; then
          echo "✅ Validación exitosa en intento $attempt!"
          echo "🎉 Endpoint responde correctamente: $BODY"
          exit 0
        else
          echo "⚠️ Respuesta no esperada (Status: $STATUS)"
        fi
      fi
      
      # Esperar antes del siguiente intento (exponential backoff simple)
      if [ $attempt -lt $MAX_RETRIES ]; then
        WAIT_TIME=$((RETRY_DELAY * attempt))
        echo "⏳ Esperando ${WAIT_TIME}s antes del siguiente intento..."
        sleep $WAIT_TIME
      fi
    done
    
    # Todos los intentos fallaron
    echo "❌ Validación fallida después de $MAX_RETRIES intentos"
    echo "🔗 Endpoint: $ENDPOINT"
    echo "📡 Última respuesta: $HTTP_RESPONSE"
    
    # Debug adicional: probar con wget como fallback
    echo "🔍 Probando con wget como diagnóstico..."
    wget -q -O - "$ENDPOINT" 2>&1 || echo "wget también falló"
    
    exit 1

      - name: 📋 Deployment summary
        if: always()
        run: |
          echo "### 📊 Resumen del Despliegue" >> $GITHUB_STEP_SUMMARY
          echo "- **Stack**: ${{ env.SAM_STACK_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Región**: ${{ env.AWS_REGION }}" >> $GITHUB_STEP_SUMMARY
          echo "- **API URL**: $API_URL" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Actor**: ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
